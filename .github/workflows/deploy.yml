name: Deploy

on:
  push:
    branches: [main]

# A given SHA only needs to deploy once; if multiple commits land fast,
# cancel earlier in-flight deploys for the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Match the VPS runtime — the build is re-run on the VPS by deploy.sh,
    # but doing it here too is a sanity gate before SSHing.
    steps:
      # Third-party actions are pinned to commit SHAs (not floating tags) so a
      # tag re-point or upstream account compromise can't quietly swap the code
      # we run. Bump these intentionally — Dependabot or `git ls-remote --tags`
      # against each repo will surface newer releases.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Tests
        run: npm test

      - name: Build (CI gate)
        run: npm run build

      # Join the tailnet as an ephemeral node — auto-cleans up after the run.
      # ACL restricts tag:ci to tag:server:tcp:22 only.
      - name: Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3.3.0
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      # SSH to the VPS over the tailnet (MagicDNS resolves guru-web-prod)
      # and invoke the on-VPS deploy.sh with this commit's SHA.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        with:
          host: guru-web-prod
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /srv/guru-web/deploy.sh ${{ github.sha }}
